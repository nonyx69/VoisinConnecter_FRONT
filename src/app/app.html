<header>
  <nav class="navbar">
    <div class="nav-brand" routerLink="/">
      <!-- <img class="logo" src="../public/Logo_VoisinConnecter.jpg" alt="LOGO des Voisins Connecté"> --> <!-- Choisir une Image-->
      <div class="brand-text"><h1>{{ title() }}</h1></div>
    </div>

    <div class="nav-links">
      <a routerLink="/" ><b>Accueil</b></a>
      <a routerLink="/"><b>Annonces</b></a>
    </div>

    <div class="nav-connexion">
      @if(authService.user$ | async; as user){

        @if(user.role && user.role.includes('ROLE_ADMIN')) {
          <a routerLink="/admin" routerLinkActive="active"><b> Admin </b></a>
        } @else {
          <a routerLink="/user" routerLinkActive="active"><b> {{user.Nom}} {{user.prenom}}</b></a>
        }
        <a (click)="logOut()" style="cursor:pointer"><b>Déconnexion</b></a>

      } @else {
        <a routerLink="/login"><b>Connexion</b></a>
        <a routerLink="/register"><b>Inscription</b></a>
      }
      </div>


  </nav>
</header>

<main class="content">
  <router-outlet />
</main>

<footer>
  <p>&copy; 2026 VoisinConnecter - Tous droits réservés</p>
</footer>
