<h2>Connexion</h2>

<form #loginForm="ngForm" (submit)="onLogin(loginForm)">


  <input type="email" placeholder="email" name="loginEmail" required ngModel>
  <input type="password" placeholder="password" name="loginPassword" required ngModel>

  <button type="submit">Se connecter</button>

</form>

<p>Pas encore de compte ? <a routerLink="/register">Inscrivez-vous</a></p>
