<h2>Inscription</h2>

<form #registerForm="ngForm" (submit)="onRegister(registerForm)">
  <div>
    <label> Nom :</label><br>
    <input type="text" placeholder="Nom" name="RegisterNom" required ngModel />
  </div>
  <br>
  <div>
    <label>Prénom :</label><br>
    <input type="text" placeholder="Prénom" name="RegisterPrenom" required ngModel/>
  </div>
  <br>
  <div>
    <label>Email :</label><br>
    <input type="email" placeholder="Email" name="RegisterEmail" required ngModel />
  </div>
  <br>
  <div>
    <label for="password">Mot de passe :</label>
    <div>
      <input type="password" placeholder="Mot de passe" name="RegisterPassword" required ngModel> </div>
  </div>
  <br>
  <button type="submit">S'inscrire</button>
</form>

<p>Déjà un compte ? <a routerLink="/login"> Connectez-vous</a></p>
