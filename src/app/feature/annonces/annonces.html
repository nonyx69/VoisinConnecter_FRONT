<div class="filter-container">
  <h3>Catégories</h3>
  <div class="filter-buttons">
    <button (click)="All()" [class.active]="selected == 'all'">Tous</button>
    @for (item of category; track item.id){
      <button (click)="Filtre(item.name)" [class.active]="selected === item.name">{{item.name}}</button>
    }
  </div>
</div>

<div class="container">
  <div class="products-grid">
    @for (item of pagedProducts(); track item.id){
      <a class="product" [routerLink]="['/product', item.id]">
        <h3>{{ item.title || 'Sans titre' }}</h3>
        <p>{{ item.description || 'Pas de description' }}</p>
      </a>
    }
  </div>

  <div class="pagination">
    <button (click)="prevPage()" [disabled]="!hasPrevPage()">← Précédent</button>
    <button (click)="nextPage()" [disabled]="!hasNextPage()">Suivant →</button>
  </div>
</div>
