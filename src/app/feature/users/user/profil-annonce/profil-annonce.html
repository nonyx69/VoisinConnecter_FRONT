@if (selectedProduct){
    <div class="products-grid-user">
      @for (item of selectedProduct; track item.id) {
        <div class="product" [routerLink]="['/product', item.id]">
          <h3>{{ item.title || 'Sans titre' }}</h3>
          <p>{{ item.description || 'Pas de description' }}</p>
        </div>
      }
    </div>
}@else if(ShowItems){
  <h2>Aucune annonce</h2>
} @else {
  <h2>Chargement de vos Données....</h2>
}
